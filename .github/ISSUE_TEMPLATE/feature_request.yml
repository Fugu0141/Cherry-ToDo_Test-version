name: "Feature request"
description: "新機能や改善案を提案します"
title: "[Feature]: "
labels: ["type: feature", "philosophy: needs discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea!

        Cherry-ToDo values flow-based task management, not just adding more features.

        Please explain the problem first.


  - type: textarea
    id: problem
    attributes:
      label: "What problem does this solve?"
      description: "日本語: 機能そのものだけでなく、どんな困りごとを解決するのかを書いてください。"
      placeholder: "Example: It is hard to understand the surrounding task structure on mobile."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution"
      description: "日本語: 提案する解決策やアイデアを書いてください。"
      placeholder: "Example: Add a mini-map-like overview in the corner."
    validations:
      required: true

  - type: textarea
    id: cherry_fit
    attributes:
      label: "Why does this fit Cherry-ToDo?"
      description: "日本語: なぜCherry-ToDoに合うと思いますか？ Cherry-ToDoの流れ重視の設計にどう役立つか説明してください。"
      placeholder: "Example: It helps users understand the flow of tasks without switching screens."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: "日本語: 関係する分野を選んでください。"
      options:
        - Timeline
        - Task creation
        - Task editing
        - Mobile UX
        - Desktop UX
        - Data / storage
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "日本語: もっとシンプルな解決方法や、検討した代替案があれば書いてください。"
      placeholder: "Example: A collapsible overview, zoom mode, or gesture-based navigation."
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: "Mockups or screenshots"
      description: "日本語: スケッチ、スクリーンショット、動画などがあれば添付してください。"
    validations:
      required: false