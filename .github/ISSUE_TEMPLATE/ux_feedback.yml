name: "UX feedback"
description: "使いにくさ・操作感・見た目について共有します"
title: "[UX]: "
labels: ["type: ux"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing UX feedback!

        Please describe where you felt confused, slow, or uncomfortable.



  - type: textarea
    id: situation
    attributes:
      label: "What were you trying to do?"
      description: "日本語: そのとき何をしようとしていたかを書いてください。"
      placeholder: "Example: I was trying to move a task to next week on mobile."
    validations:
      required: true

  - type: textarea
    id: confusion
    attributes:
      label: "What felt confusing or difficult?"
      description: "日本語: 何が分かりにくい・難しい・使いづらいと感じたかを書いてください。"
      placeholder: "Example: I could not understand where I was in the timeline."
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: "Device"
      description: "日本語: 使用していたデバイスを選んでください。"
      options:
        - Desktop
        - Tablet
        - Mobile
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "What would feel better?"
      description: "日本語: どうなると使いやすくなりそうかを書いてください。"
      placeholder: "Example: I want to see the surrounding days like a mini-map."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots or recordings"
      description: "日本語: 必要であれば画像や動画を添付してください。"
    validations:
      required: false